<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Texas Hold'em</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <!-- Lobby -->
    <section id="lobby" class="screen">
      <div class="brand">🎴 Texas Hold'em</div>
      <p class="sub">Play no-limit hold'em with friends, right inside Telegram.</p>

      <div class="opts">
        <label>Blinds
          <select id="optBlinds">
            <option value="5,10">5 / 10</option>
            <option value="10,20" selected>10 / 20</option>
            <option value="25,50">25 / 50</option>
            <option value="50,100">50 / 100</option>
            <option value="100,200">100 / 200</option>
          </select>
        </label>
        <label>Stack
          <select id="optStack">
            <option value="500">500</option>
            <option value="1000" selected>1000</option>
            <option value="2500">2500</option>
            <option value="5000">5000</option>
          </select>
        </label>
        <label>Timer
          <select id="optTimer">
            <option value="15">15s</option>
            <option value="30" selected>30s</option>
            <option value="60">60s</option>
            <option value="120">120s</option>
          </select>
        </label>
      </div>

      <button id="btnCreate" class="primary big">Create a table</button>
      <div class="divider"><span>or join one</span></div>
      <div class="join-row">
        <input id="codeInput" inputmode="latin" autocapitalize="characters"
               maxlength="6" placeholder="CODE" />
        <button id="btnJoin" class="ghost">Join</button>
      </div>
      <div id="lobbyMsg" class="msg"></div>
    </section>

    <!-- Table -->
    <section id="table" class="screen hidden">
      <header class="topbar">
        <button id="btnLeave" class="icon" title="Leave">←</button>
        <button id="codeChip" class="code-chip" title="Tap to copy">CODE</button>
        <div class="stage" id="stageLabel">—</div>
      </header>

      <div id="resultBanner" class="result-banner hidden"></div>

      <div class="felt">
        <div class="opponents" id="opponents"></div>
        <div class="board-area">
          <div class="pot" id="pot">Pot: 0</div>
          <div class="board" id="board"></div>
        </div>
        <div class="me" id="me"></div>
      </div>

      <div class="controls" id="controls"></div>

      <details class="logbox">
        <summary>Game log</summary>
        <ul id="log"></ul>
      </details>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
